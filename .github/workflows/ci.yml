name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types:
      - opened
      - edited
      - synchronize

permissions:
  contents: write
  pull-requests: read # Necesar pentru linterul de titluri PR

jobs:
  # --- JOB-UL PENTRU VERIFICARE TITLU PR (Conventional Commits)
  pr-title-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Check PR Title
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- JOB-UL PENTRU BACKEND 
  backend:
      runs-on: ubuntu-latest

      steps:
      - uses: actions/checkout@v4

      # 1. Construim imaginea completă (folosind Dockerfile-ul tău multi-stage)
      - name: Build Docker Image
        run: docker build -t cluster-prod .

      # 2. Rulăm Lint-ul cu ruff direct într-un container temporar bazat pe Python
      # (Sau îl lăsăm local ca să fie rapid, dar în container e mai sigur)
      - name: Lint with ruff inside Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace python:3.11-slim sh -c "pip install ruff && ruff check backend/"

      # 3. Rulăm testele cu pytest și coverage INSIDE container
      # Pentru a rula testele de backend cu librăriile de dev, folosim imaginea de producție, 
      # dar instalăm rapid dev-requirements.txt înainte de a rula pytest.
      - name: Test with pytest inside Container (Fail under 80%)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/backend:/app/backend-report \
            cluster-prod sh -c "pip install -r dev-requirements.txt && pytest --cov=app --cov-report=xml:/app/backend-report/coverage.xml --cov-fail-under=80"

      # 4. Upload la raportul XML (generat de container în folderul mapat mai sus)
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage.xml

      # 5. Boot / Smoke test: Pornim containerul de producție în fundal și testăm /health
      - name: Boot and Smoke Test Container
        run: |
          # Pornim containerul în fundal mapând portul 8000
          docker run -d -p 8000:8000 --name cluster-running cluster-prod
          
          # Așteptăm 3 secunde să se ridice Flask
          sleep 3
          
          # Verificăm dacă ruta /health răspunde cu succes
          curl --fail http://127.0.0.1:8000/health
          
          # Oprim containerul după succes
          docker stop cluster-running



  # --- JOB-UL PENTRU FRONTEND 
  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint
      run: |
        cd frontend
        npm run lint || npx eslint .

    - name: Type-check
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Build
      run: |
        cd frontend
        npm run build

  # --- JOB-UL PENTRU AUTOMATIZARE RELEASE NOTES
  release:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Release Notes
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.${{ github.run_number }}.0
        name: Release v1.${{ github.run_number }}.0
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}