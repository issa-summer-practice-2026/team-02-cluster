name: Deliver & Auto-Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Calculăm automat versiunea (SemVer) sau folosim un tag incremental
      # Pentru simplitate și flexibilitate, generăm un tag bazat pe un tool nativ sau citim fișierul VERSION
      - name: Determine Version
        id: versioning
        run: |
          # Dacă ai un fișier numit VERSION în rădăcină (văzut în screenshot-ul tău anterior), îl folosim
          if [ -f VERSION ]; then
            VERSION_TAG=$(cat VERSION)
          else
            VERSION_TAG="1.0.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION_TAG" >> $GITHUB_OUTPUT

      # 2. Ne logăm în GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Construim și trimitem imaginea cu tag-ul de versiune în GHCR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.versioning.outputs.VERSION }}

      # 4. Creăm GitHub Release automat cu auto-generated notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.VERSION }}
          name: Release v${{ steps.versioning.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}